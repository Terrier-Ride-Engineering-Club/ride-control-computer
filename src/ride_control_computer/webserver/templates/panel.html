{% extends "base.html" %}
{% block content %}

{% if not panel_enabled %}

<div class="alert alert-warning mt-3">
    <strong>Web panel not enabled.</strong>
    Restart RCC with <code>--web-panel</code> to enable the web control panel.
</div>

{% else %}

<style>
  .panel-card {
    background: #1e1e1e;
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .panel-label {
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: #666;
    margin-bottom: 12px;
  }

  /* Key switch */
  .key-btn {
    flex: 1;
    padding: 14px 0;
    border: 2px solid #333;
    border-radius: 6px;
    background: #2a2a2a;
    color: #888;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s, border-color .15s, color .15s;
  }
  .key-btn.active { background: #1a3d1a; border-color: #4caf50; color: #fff; }
  .key-btn:active  { filter: brightness(1.25); }

  /* Indicators */
  .indicator {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #2a2a2a;
    border: 2px solid #444;
    display: inline-block;
  }
  .indicator.on        { background: #f5f5f5; border-color: #fff; box-shadow: 0 0 6px #ffffff88; }
  @keyframes blinkAnim     { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  @keyframes blinkFastAnim { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  .indicator.blink      { background: #f5f5f5; border-color: #fff; animation: blinkAnim 500ms step-start infinite; }
  .indicator.blink_fast { background: #f5f5f5; border-color: #fff; animation: blinkFastAnim 100ms step-start infinite; }

  /* Operator buttons */
  .op-btn {
    width: 100%;
    padding: 22px 0;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  .op-btn:active { filter: brightness(1.3); }
  #btn-dispatch { background: #27ae60; color: #fff; }
  #btn-reset    { background: #e67e22; color: #fff; }
  #btn-stop     { background: #546e7a; color: #fff; }

  /* E-Stop */
  #estopBtn {
    width: 100%;
    padding: 32px 0;
    border: none;
    border-radius: 8px;
    background: #c0392b;
    color: #fff;
    font-size: 24px;
    font-weight: 900;
    letter-spacing: .12em;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  #estopBtn:active { filter: brightness(1.2); }

  /* Jog */
  .jog-btn {
    flex: 1;
    padding: 32px 0;
    border: none;
    border-radius: 8px;
    background: #263238;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  .jog-btn:active { filter: brightness(1.3); }
</style>

<!-- Status bar -->
<div class="d-flex justify-content-between align-items-center p-3 mb-3"
     style="background:#1e1e1e; border-radius:10px;">
    <span id="rccState" class="text-white fw-bold fs-5">—</span>
    <span id="faultBadge" class="badge bg-danger" style="display:none">FAULT</span>
</div>

<!-- Key switch -->
<div class="panel-card">
    <div class="panel-label">Key Switch</div>
    <div class="d-flex gap-2">
        <button class="key-btn" id="pw-off"   onclick="setPower('off')">OFF</button>
        <button class="key-btn" id="pw-on"    onclick="setPower('on')">ON</button>
        <button class="key-btn" id="pw-maint" onclick="setPower('maintenance')">MAINT</button>
    </div>
</div>

<!-- Operator buttons -->
<div class="panel-card">
    <div class="panel-label">Operator Controls</div>
    <div class="d-flex gap-3">
        <div class="d-flex flex-column align-items-center gap-2 flex-fill">
            <div class="indicator" id="ind-dispatch"></div>
            <button id="btn-dispatch" class="op-btn">DISPATCH</button>
        </div>
        <div class="d-flex flex-column align-items-center gap-2 flex-fill">
            <div class="indicator" id="ind-reset"></div>
            <button id="btn-reset" class="op-btn">RESET</button>
        </div>
        <div class="d-flex flex-column align-items-center gap-2 flex-fill">
            <div class="indicator" id="ind-stop"></div>
            <button id="btn-stop" class="op-btn">STOP</button>
        </div>
    </div>
</div>

<!-- E-Stop -->
<div class="panel-card">
    <button id="estopBtn">&#9889; E-STOP</button>
</div>

<!-- Jog (shown only in maintenance mode) -->
<div class="panel-card" id="jogSection" style="display:none">
    <div class="panel-label">Maintenance Jog</div>
    <div class="d-flex gap-3">
        <button class="jog-btn" id="btn-jog-up">&#9650; JOG UP</button>
        <button class="jog-btn" id="btn-jog-down">&#9660; JOG DOWN</button>
    </div>
</div>

<script>
const POWER_BTN = { OFF: "pw-off", MAINTENANCE: "pw-maint" };
let _held = new Set();

function poll() {
    fetch("/api/panel/state")
        .then(r => r.json())
        .then(d => {
            document.getElementById("rccState").textContent = d.rcc_state;
            const fb = document.getElementById("faultBadge");
            fb.style.display = d.has_active_faults ? "" : "none";

            for (const [name, mode] of Object.entries(d.indicators)) {
                const el = document.getElementById("ind-" + name);
                if (el) el.className = "indicator " + mode;
            }

            ["pw-off", "pw-on", "pw-maint"].forEach(id =>
                document.getElementById(id).classList.remove("active"));
            document.getElementById(POWER_BTN[d.rcc_state] ?? "pw-on").classList.add("active");

            document.getElementById("jogSection").style.display =
                d.rcc_state === "MAINTENANCE" ? "block" : "none";
        })
        .catch(() => {});
}
setInterval(poll, 250);
poll();

function post(url, body) {
    fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
    }).catch(() => {});
}

function pressBtn(name) {
    if (_held.has(name)) return;
    _held.add(name);
    post("/api/panel/button/" + name, { pressed: true });
}
function releaseBtn(name) {
    if (!_held.has(name)) return;
    _held.delete(name);
    post("/api/panel/button/" + name, { pressed: false });
}
function setPower(position) { post("/api/panel/power", { position }); }
function setJog(direction)  { post("/api/panel/jog",   { direction }); }

function wireOpBtn(id, name) {
    const btn = document.getElementById(id);
    btn.addEventListener("mousedown",   () => pressBtn(name));
    btn.addEventListener("mouseup",     () => releaseBtn(name));
    btn.addEventListener("mouseleave",  () => releaseBtn(name));
    btn.addEventListener("touchstart",  e => { e.preventDefault(); pressBtn(name); });
    btn.addEventListener("touchend",    e => { e.preventDefault(); releaseBtn(name); });
    btn.addEventListener("touchcancel", e => { e.preventDefault(); releaseBtn(name); });
}
wireOpBtn("btn-dispatch", "dispatch");
wireOpBtn("btn-reset",    "reset");
wireOpBtn("btn-stop",     "stop");
wireOpBtn("estopBtn",     "estop");

function wireJogBtn(id, direction) {
    const btn = document.getElementById(id);
    btn.addEventListener("mousedown",   () => setJog(direction));
    btn.addEventListener("mouseup",     () => setJog("neutral"));
    btn.addEventListener("mouseleave",  () => setJog("neutral"));
    btn.addEventListener("touchstart",  e => { e.preventDefault(); setJog(direction); });
    btn.addEventListener("touchend",    e => { e.preventDefault(); setJog("neutral"); });
    btn.addEventListener("touchcancel", e => { e.preventDefault(); setJog("neutral"); });
}
wireJogBtn("btn-jog-up",   "up");
wireJogBtn("btn-jog-down", "down");
</script>

{% endif %}
{% endblock %}
