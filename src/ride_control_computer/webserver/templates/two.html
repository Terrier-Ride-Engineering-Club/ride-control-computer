{% extends "base.html" %}

{% block content %}
<div class="card shadow">
    <div class="card-body">

        <h3 class="card-title">Motor Data</h3>

        <table class="table table-striped table-bordered mt-3">
            <thead class="table-dark">
                <tr>
                    <th>Label</th>
                    <th>Time</th>
                    <th>Speed</th>
                    <th>Position</th>
                </tr>
            </thead>
            <tbody>
                {% for row in data %}
                <tr>
                    <td>{{ row.data }}</td>
                    <td>{{ row.time }}</td>
                    <td>{{ row.speed }}</td>
                    <td>{{ row.position }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>
</div>
{% endblock %}
