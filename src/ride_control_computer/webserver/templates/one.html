<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TREC HMI</title>
</head>
                <style>
                    .bars-container {
                        display: flex;
                        justify-content: center;
                        gap: 50px;
                        margin-top: 30px;
                    }

                    .bar-wrapper {
                        position: relative;
                        width: 50px;
                        height: 200px;
                        border: 2px solid #333;
                        background: #f5f5f5;
                    }

                    .marker-line {
                        position: absolute;
                        left: 0;
                        width: 100%;
                        height: 3px;
                        background: red;
                        transform: translateY(50%);
                    }

                    .bar-label {
                        text-align: center;
                        margin-top: 10px;
                        font-size: 16px;
                    }
                </style>
            </head>
            <body>

                <div style="text-align:center">
                    <h1>speed = {{ speed }}</h1>
                    <h1>state = {{ state }}</h1>
                    <h1>positions = {{ positions }}</h1>
                    <h1>current run time = {{ rideTime }} </h1>

                    <div class="bars-container">
                        <div>
                            <div class="bar-wrapper">
                                <div class="marker-line" style="bottom: {{ line1 }}%;"></div>
                            </div>
                            <div class="bar-label">Car 1</div>
                        </div>

                        <div>
                            <div class="bar-wrapper">
                                <div class="marker-line" style="bottom: {{ line2 }}%;"></div>
                            </div>
                            <div class="bar-label">Car 2</div>
                        </div>
                    </div>

                    <div style="text-align:center; margin-top:30px;">
                        <a href="/one"><button style="padding: 12px 24px; font-size:18px;"><b>One</b></button></a>
                        <a href="/two"><button style="padding: 12px 24px; font-size:18px;">Two</button></a>
                        <a href="/three"><button style="padding: 12px 24px; font-size:18px;">Three</button></a>
                    </div>
                </div>
</body>
</html>
